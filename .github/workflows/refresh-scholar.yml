name: Refresh Google Scholar Data

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-scholar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install scholarly

      - name: Refresh publications from Google Scholar
        timeout-minutes: 10
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          log_file="$(mktemp)"
          timeout 8m python -u fetch_scholar.py >"$log_file" 2>&1 &
          pid=$!

          cleanup() {
            if kill -0 "$pid" 2>/dev/null; then
              kill "$pid" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          while kill -0 "$pid" 2>/dev/null; do
            echo "Scholar refresh still running at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            sleep 30
          done

          wait "$pid" || status=$?
          cat "$log_file"

          if [ "${status:-0}" -eq 124 ]; then
            echo "Scholar refresh timed out after 8 minutes."
            exit 124
          fi

          exit "${status:-0}"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git restore data.backup.json || true
          if git diff --quiet -- data.json; then
            echo "No data.json changes to commit."
            exit 0
          fi
          git add data.json
          git commit -m "Refresh publications from Google Scholar"
          git push
