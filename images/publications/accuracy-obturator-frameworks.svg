<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Accuracy Assessment of Digitally and Conventionally Manufactured Obturator Frameworks for Palatal Defects</title>
  <desc id="desc">Custom publication cover with dental-digital themed abstract geometry for a Digital Dentistry Journal paper.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f2a"/>
      <stop offset="48%" stop-color="#15485a"/>
      <stop offset="100%" stop-color="#d9ecef"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbfb" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#e6f2f3" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#24a6a6"/>
      <stop offset="100%" stop-color="#58d1c6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#08202b" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="172" cy="124" r="132" fill="#71d6c6" fill-opacity="0.12"/>
  <circle cx="1038" cy="662" r="188" fill="#ffffff" fill-opacity="0.12"/>
  <circle cx="1025" cy="144" r="94" fill="#58d1c6" fill-opacity="0.18"/>
  <path d="M0 623 C231 541 358 711 584 654 C794 601 936 463 1200 527 L1200 800 L0 800 Z" fill="#091a22" fill-opacity="0.26"/>

  <g transform="translate(83 88)" filter="url(#shadow)">
    <rect width="708" height="624" rx="34" fill="url(#panel)"/>
    <rect x="0" y="0" width="708" height="16" rx="8" fill="url(#accent)"/>

    <text x="56" y="88" fill="#1c6f74" font-family="Georgia, 'Times New Roman', serif" font-size="28" letter-spacing="3.5">DIGITAL DENTISTRY JOURNAL</text>
    <text x="56" y="148" fill="#102833" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700">
      <tspan x="56" dy="0">Accuracy Assessment of</tspan>
      <tspan x="56" dy="66">Digitally and Conventionally</tspan>
      <tspan x="56" dy="66">Manufactured Obturator</tspan>
      <tspan x="56" dy="66">Frameworks for Palatal Defects</tspan>
    </text>

    <text x="56" y="470" fill="#365663" font-family="Arial, Helvetica, sans-serif" font-size="27">
      <tspan x="56" dy="0">In-vitro comparison of conventional, digital-analogue,</tspan>
      <tspan x="56" dy="39">and digital workflows for obturator framework accuracy.</tspan>
    </text>

    <text x="56" y="576" fill="#163340" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="1.1">DIMA ABU BAKER ET AL.</text>
    <text x="56" y="614" fill="#163340" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="1.1">2026</text>
  </g>

  <g transform="translate(816 118)">
    <path d="M146 76 C206 35 286 42 343 90 C392 131 420 201 408 274 C395 355 342 415 264 445 C188 474 103 464 47 415 C1 375 -12 308 10 238 C32 168 77 113 146 76 Z" fill="#f2fcfb" fill-opacity="0.92"/>
