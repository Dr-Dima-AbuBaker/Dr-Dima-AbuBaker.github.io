    <circle cx="286" cy="283" r="13" fill="#1a6072"/>
    <path d="M126 488 L411 488" stroke="#d7efee" stroke-width="2" opacity="0.55"/>
    <text x="126" y="532" fill="#eefafa" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="1.6">PALATAL DEFECT WORKFLOW STUDY</text>
