    <path d="M210 160 C244 132 293 129 328 154 C366 181 382 236 371 286 C359 341 318 372 268 382 C223 390 176 379 148 350 C120 321 115 276 127 237 C139 200 166 176 210 160 Z" fill="#d4eeec"/>
    <path d="M176 208 C210 178 255 172 290 187 C327 203 349 240 347 284 C344 332 309 370 261 381 C221 391 177 383 147 355 C117 328 106 288 117 252 C125 228 141 217 176 208 Z" fill="#8fd7d1"/>
    <path d="M170 254 C201 228 240 221 272 232 C302 242 322 268 322 300 C322 342 289 372 242 378 C206 381 166 367 143 342 C120 316 114 282 126 256 C133 241 147 237 170 254 Z" fill="#1a6072"/>
